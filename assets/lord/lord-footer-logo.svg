<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-label="LORD Event Agency">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7dd"/>
      <stop offset="0.45" stop-color="#eec26f"/>
      <stop offset="1" stop-color="#b47728"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a2a7a"/>
      <stop offset="1" stop-color="#071538"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="12" y="12" width="1176" height="336" rx="52" fill="url(#blue)" opacity="0.28"/>
  <g transform="translate(534 64) scale(1.42)" filter="url(#soft)">
    <path d="M10 74L17 28L32 54L48 16L64 54L79 28L86 74H10Z" fill="url(#gold)" stroke="#f7d387" stroke-width="3" stroke-linejoin="round"/>
    <path d="M18 59H78" stroke="#fff1cb" stroke-width="4" stroke-linecap="round" opacity="0.78"/>
  </g>

  <text x="600" y="228" font-size="136" text-anchor="middle" letter-spacing="24" font-family="Georgia, 'Times New Roman', serif" font-weight="700" fill="url(#gold)">LORD</text>
  <text x="600" y="288" font-size="34" text-anchor="middle" letter-spacing="7" font-family="Georgia, 'Times New Roman', serif" fill="url(#gold)">ивент-агентство</text>
</svg>
